version: '3.9'
services:
  api:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - APP_SECRET=dev-secret-change-me
      - TOKEN_TTL_SECONDS=86400
      - REFRESH_TOKEN_TTL_SECONDS=2592000
      - DATABASE_URL=postgresql://contactsync:contactsync@postgres:5432/contactsync
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=contactsync
      - POSTGRES_USER=contactsync
      - POSTGRES_PASSWORD=contactsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
